# SaaS MVP — 正式部署堆疊：PostgreSQL + Redis + 多 worker API + ops 排程器。
# 起動：cp .env.example .env（改密鑰）→ docker compose up -d --build
# 首發灌示範資料：docker compose run --rm web seed
#
# 多 worker 安全性：API 以 gunicorn 多 worker 跑；跨 worker 共享狀態靠
#  - PostgreSQL 行鎖（FOR UPDATE：quota / push 配額 / 預約容量 / webhook 冪等）
#  - Redis 限流後端（SAAS_RATE_LIMIT_BACKEND=redis）
# scheduler 只能單一實例（勿 scale）。

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saas_pw}
      POSTGRES_DB: ${POSTGRES_DB:-saas}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas} -d ${POSTGRES_DB:-saas}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 1g
    shm_size: 256m

  redis:
    image: redis:7-alpine
    # --maxmemory + LRU：限流快取在壓力下淘汰舊 key（最壞情況限流短暫 fail-open），
    # 配合 mem_limit 不讓 redis 無上限長大。
    command: ["redis-server", "--save", "", "--appendonly", "no",
              "--maxmemory", "200mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 256m

  web:
    build: .
    command: ["web"]
    env_file: .env
    environment:
      SAAS_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD:-saas_pw}@db:5432/${POSTGRES_DB:-saas}
      SAAS_RATE_LIMIT_BACKEND: redis
      SAAS_REDIS_URL: redis://redis:6379/0
      SAAS_HOST: 0.0.0.0
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
    ports:
      # 僅綁 loopback：對外一律走主機 nginx（TLS + 安全標頭 + 限流），不開放公網
      # 直連容器明文 HTTP；反代信任邊界也因此收斂到本機 nginx。
      - "127.0.0.1:${WEB_PORT:-8099}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # 資源上限：避免單租戶/異常請求吃光整機 RAM/CPU 拖垮同主機其他服務。
    mem_limit: 1500m
    cpus: 2.0
    pids_limit: 512
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  scheduler:
    build: .
    command: ["scheduler"]
    env_file: .env
    environment:
      SAAS_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD:-saas_pw}@db:5432/${POSTGRES_DB:-saas}
      SAAS_RATE_LIMIT_BACKEND: redis
      SAAS_REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # 覆寫 image 的預設 HTTP /healthz 探針（排程容器無 HTTP server）：
    # 改判排程迴圈心跳檔新鮮度（<180s）——迴圈卡死即轉 unhealthy + 觸發 restart。
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/sched/heartbeat && [ $(($(date +%s) - $(stat -c %Y /tmp/sched/heartbeat))) -lt 180 ]"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3
    mem_limit: 256m
    cpus: 1.0
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  pgdata:
