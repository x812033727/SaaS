# SaaS MVP — 正式部署堆疊：PostgreSQL + Redis + 多 worker API + ops 排程器。
# 起動：cp .env.example .env（改密鑰）→ docker compose up -d --build
# 首發灌示範資料：docker compose run --rm web seed
#
# 多 worker 安全性：API 以 gunicorn 多 worker 跑；跨 worker 共享狀態靠
#  - PostgreSQL 行鎖（FOR UPDATE：quota / push 配額 / 預約容量 / webhook 冪等）
#  - Redis 限流後端（SAAS_RATE_LIMIT_BACKEND=redis）
# scheduler 只能單一實例（勿 scale）。

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saas_pw}
      POSTGRES_DB: ${POSTGRES_DB:-saas}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas} -d ${POSTGRES_DB:-saas}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 1g
    shm_size: 256m

  redis:
    image: redis:7-alpine
    # --maxmemory + LRU：限流快取在壓力下淘汰舊 key（最壞情況限流短暫 fail-open），
    # 配合 mem_limit 不讓 redis 無上限長大。
    command: ["redis-server", "--save", "", "--appendonly", "no",
              "--maxmemory", "200mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 256m

  web:
    build: .
    command: ["web"]
    env_file: .env
    environment:
      SAAS_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD:-saas_pw}@db:5432/${POSTGRES_DB:-saas}
      SAAS_RATE_LIMIT_BACKEND: redis
      # SSE 即時通知跨 worker 廣播（多 worker 部署必需；否則只在單一 worker 內即時）。
      SAAS_EVENTS_BACKEND: redis
      SAAS_REDIS_URL: redis://redis:6379/0
      SAAS_HOST: 0.0.0.0
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      # 後台「重新佈署」按鈕：寫觸發檔到此路徑（下方 volume 掛到主機目錄），
      # 主機 systemd.path 監看到即跑 saas-deploy.sh。
      SAAS_DEPLOY_TRIGGER_PATH: /var/run/saas-deploy/deploy.request
    volumes:
      # 部署觸發檔落到主機目錄（repo 外，免被 git reset 清掉）；主機 uid 10001 可寫。
      - /var/lib/saas-deploy/requests:/var/run/saas-deploy
    ports:
      # 僅綁 loopback：對外一律走主機 nginx（TLS + 安全標頭 + 限流），不開放公網
      # 直連容器明文 HTTP；反代信任邊界也因此收斂到本機 nginx。
      - "127.0.0.1:${WEB_PORT:-8099}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # 資源上限：避免單租戶/異常請求吃光整機 RAM/CPU 拖垮同主機其他服務。
    mem_limit: 1500m
    cpus: 2.0
    pids_limit: 512
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  db-backup:
    # 與 db 同版本 image：pg_dump/pg_restore 版本精準相符（app image 沒有 pg_dump）。
    # 每日 BACKUP_TIME 自動 pg_dump custom format 到 ./backups，保留 BACKUP_RETENTION_DAYS 天。
    # 手動備份：docker compose run --rm db-backup /usr/local/bin/backup.sh
    # 還原：    docker compose run --rm -e FORCE=1 db-backup \
    #           /usr/local/bin/restore.sh /backups/saas-YYYYmmdd-HHMMSS.dump
    image: postgres:16-alpine
    entrypoint: ["/usr/local/bin/db-backup-entrypoint.sh"]
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-saas}
      PGPASSWORD: ${POSTGRES_PASSWORD:-saas_pw}
      PGDATABASE: ${POSTGRES_DB:-saas}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_TIME: ${BACKUP_TIME:-0300}
    volumes:
      # 備份檔落到主機目錄，與容器生命週期解耦（離站建議：另以 rsync/物件儲存同步異地）。
      - ./backups:/backups
      - ./docker/backup.sh:/usr/local/bin/backup.sh:ro
      - ./docker/restore.sh:/usr/local/bin/restore.sh:ro
      - ./docker/db-backup-entrypoint.sh:/usr/local/bin/db-backup-entrypoint.sh:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # 覆寫 postgres image 無 HTTP 探針的問題：改判備份迴圈心跳檔新鮮度（<180s）。
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/dbbackup/heartbeat && [ $(($(date +%s) - $(stat -c %Y /tmp/dbbackup/heartbeat))) -lt 180 ]"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    mem_limit: 128m
    pids_limit: 64
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  scheduler:
    build: .
    command: ["scheduler"]
    env_file: .env
    environment:
      SAAS_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD:-saas_pw}@db:5432/${POSTGRES_DB:-saas}
      SAAS_RATE_LIMIT_BACKEND: redis
      SAAS_REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # 覆寫 image 的預設 HTTP /healthz 探針（排程容器無 HTTP server）：
    # 改判排程迴圈心跳檔新鮮度（<180s）——迴圈卡死即轉 unhealthy + 觸發 restart。
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/sched/heartbeat && [ $(($(date +%s) - $(stat -c %Y /tmp/sched/heartbeat))) -lt 180 ]"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3
    mem_limit: 256m
    cpus: 1.0
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  pgdata:
