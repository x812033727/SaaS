# Alembic 開發機 CLI 設定 — 執行例:
#   PYTHONPATH=src alembic revision --autogenerate -m "描述"
#   PYTHONPATH=src alembic upgrade head
# URL 由 migrations/env.py 動態取 settings.database_url(SAAS_DATABASE_URL 覆寫),
# 此檔的 sqlalchemy.url 留空。正式啟動走 python -m saas_mvp.ops.migrate,不讀此檔。

[alembic]
script_location = src/saas_mvp/migrations
prepend_sys_path = src
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
