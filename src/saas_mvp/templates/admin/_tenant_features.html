<h2>進階功能</h2>
<table>
  <thead><tr><th>功能</th><th>月費</th><th>狀態</th><th></th></tr></thead>
  <tbody>
    {% for f in features %}
    <tr>
      <td data-label="功能">{{ f.label }}</td>
      <td data-label="月費">{{ (f.monthly_price_cents / 100) | round(0, 'floor') | int }} 元</td>
      <td data-label="狀態"><span class="badge {{ 'on' if f.enabled else 'off' }}">{{ '開通' if f.enabled else '未開通' }}</span></td>
      <td>
        {% if f.enabled %}
        <button hx-post="/ui/admin/tenants/{{ tenant_id }}/features/{{ f.key }}"
                hx-vals='{"enabled": "false"}' hx-target="#tenant-features" hx-swap="innerHTML">關閉</button>
        {% else %}
        <button hx-post="/ui/admin/tenants/{{ tenant_id }}/features/{{ f.key }}"
                hx-vals='{"enabled": "true"}' hx-target="#tenant-features" hx-swap="innerHTML">開通</button>
        {% endif %}
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
