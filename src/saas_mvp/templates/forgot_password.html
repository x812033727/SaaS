{% extends "base.html" %}
{% block title %}忘記密碼 · LINE Bot 管理{% endblock %}
{% block content %}
<div class="auth-wrap">
<span class="auth-brand">LINE Bot 管理</span>
<h1>忘記密碼</h1>
<div class="card">
  {% if sent %}
    <p>若該 Email 已註冊，我們已寄出重設密碼連結，請至信箱查收（連結 24 小時內有效）。</p>
    <p><a class="btn" href="/ui/login">回登入</a></p>
  {% else %}
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="/ui/forgot-password">
      <label for="email">註冊 Email</label>
      <input id="email" name="email" type="email" required autocomplete="email">
      <button type="submit">寄送重設連結</button>
    </form>
  {% endif %}
</div>
</div>
{% endblock %}
