<h2>備註</h2>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form hx-post="/ui/notes" hx-target="#notes-card" hx-swap="innerHTML" class="row">
  <label>標題<input name="title" maxlength="256" required></label>
  <label>內容<input name="content" maxlength="65536"></label>
  <button type="submit">新增備註</button>
</form>

{% if notes %}
<table>
  <thead><tr><th>#</th><th>標題</th><th>內容</th><th></th></tr></thead>
  <tbody>
    {% for n in notes %}
    {% if editing_id == n.id %}
    <tr>
      <td data-label="#">{{ n.id }}</td>
      <td colspan="3">
        <form hx-post="/ui/notes/{{ n.id }}/update" hx-target="#notes-card" hx-swap="innerHTML" class="row">
          <label>標題<input name="title" value="{{ n.title }}" maxlength="256" required></label>
          <label>內容<input name="content" value="{{ n.content or '' }}" maxlength="65536"></label>
          <button type="submit">儲存</button>
          <button type="button" hx-get="/ui/notes/list" hx-target="#notes-card" hx-swap="innerHTML">取消</button>
        </form>
      </td>
    </tr>
    {% else %}
    <tr>
      <td data-label="#">{{ n.id }}</td>
      <td data-label="標題">{{ n.title }}</td>
      <td data-label="內容">{{ n.content or '—' }}</td>
      <td>
        <button hx-get="/ui/notes/{{ n.id }}/edit" hx-target="#notes-card" hx-swap="innerHTML">編輯</button>
        <button hx-post="/ui/notes/{{ n.id }}/delete" hx-target="#notes-card" hx-swap="innerHTML"
                hx-confirm="確定刪除此備註？">刪除</button>
      </td>
    </tr>
    {% endif %}
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="muted">尚無備註。</p>
{% endif %}
