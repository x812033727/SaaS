<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>購買電子禮物卡 · {{ display_name }}</title>
  <meta name="robots" content="noindex">
  <style>
    :root { --theme: #1A5C4A; --bg: #FAF9F6; --card-bg: #fff; --ink: #2B2B28;
            --muted: #8A867C; --line: #E9E5DD; --gold: #C4956A; }
    body { font-family: "Noto Sans TC", system-ui, sans-serif; margin: 0;
           background: var(--bg); color: var(--ink); line-height: 1.65; }
    main { padding: 1.25rem; max-width: 560px; margin: 0 auto; }
    h1 { color: var(--theme); }
    .card { background: var(--card-bg); border: 1px solid var(--line); border-radius: 12px;
            padding: 1rem 1.2rem; margin: .8rem 0; }
    label { display: block; margin: .7rem 0 .2rem; font-weight: 600; font-size: .92rem; }
    input[type=text], input[type=email], textarea {
      width: 100%; box-sizing: border-box; padding: .55rem .7rem; border: 1px solid var(--line);
      border-radius: 8px; font: inherit; }
    .denoms { display: flex; flex-wrap: wrap; gap: .5rem; }
    .denoms label { flex: 1 1 30%; margin: 0; border: 1px solid var(--line); border-radius: 10px;
                    padding: .7rem; text-align: center; cursor: pointer; font-weight: 700; }
    .denoms input { display: none; }
    .denoms input:checked + span { color: var(--theme); }
    .denoms label:has(input:checked) { border-color: var(--theme); background: #eef6f3; }
    .error { background: #FDECEC; color: #B3261E; border-radius: 8px; padding: .6rem .8rem; }
    .guarantee { font-size: .85rem; color: var(--muted); white-space: pre-wrap; }
    button { margin-top: 1rem; width: 100%; padding: .8rem; border: 0; border-radius: 10px;
             background: var(--theme); color: #fff; font: inherit; font-weight: 700; cursor: pointer; }
    .agree { display: flex; gap: .5rem; align-items: flex-start; margin-top: .8rem;
             font-size: .9rem; font-weight: 400; }
    a.back { color: var(--muted); font-size: .9rem; text-decoration: none; }
  </style>
</head>
<body>
<main>
  <a class="back" href="/p/{{ slug }}">← {{ display_name }}</a>
  <h1>購買電子禮物卡</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" class="card">
    <label>面額</label>
    <div class="denoms">
      {% for d in denominations %}
      <label>
        <input type="radio" name="amount_twd" value="{{ d }}" required
               {% if form.get("amount_twd") == d %}checked{% endif %}>
        <span>NT${{ "{:,}".format(d) }}</span>
      </label>
      {% endfor %}
    </div>
    <label for="purchaser_email">您的電子郵件(卡號將寄送至此)</label>
    <input type="email" id="purchaser_email" name="purchaser_email" required maxlength="256"
           value="{{ form.get('purchaser_email', '') }}">
    <label for="purchaser_name">購買人姓名(選填)</label>
    <input type="text" id="purchaser_name" name="purchaser_name" maxlength="128"
           value="{{ form.get('purchaser_name', '') }}">
    <label for="recipient_name">收禮人姓名(選填,送禮用)</label>
    <input type="text" id="recipient_name" name="recipient_name" maxlength="128"
           value="{{ form.get('recipient_name', '') }}">
    <label for="message">祝福訊息(選填)</label>
    <textarea id="message" name="message" maxlength="500" rows="2">{{ form.get('message', '') }}</textarea>
    <div class="card guarantee">
      <strong>履約保障說明</strong><br>{{ guarantee }}
    </div>
    <label class="agree">
      <input type="checkbox" name="agree" value="true" required>
      我已閱讀並同意上述履約保障說明;付款完成後卡號將顯示於本站並寄送至我的電子郵件。
    </label>
    <button type="submit">前往付款</button>
  </form>
</main>
</body>
</html>
