<h2>Bot 模式</h2>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
{% if not has_line_config %}
  <p class="muted">尚未設定 LINE Bot，請先到「LINE 設定」完成憑證設定後才能切換為預約模式。</p>
{% else %}
  <p>目前模式：<span class="badge {{ 'on' if bot_mode == 'booking' else '' }}">{{ '預約' if bot_mode == 'booking' else '翻譯' }}</span></p>
  <form hx-post="/ui/booking/bot-mode" hx-target="#botmode-card" hx-swap="innerHTML">
    <label for="bot_mode">切換 bot 行為</label>
    <select id="bot_mode" name="bot_mode">
      <option value="translation" {{ 'selected' if bot_mode == 'translation' else '' }}>翻譯</option>
      <option value="booking" {{ 'selected' if bot_mode == 'booking' else '' }}>預約</option>
    </select>
    <button type="submit">套用</button>
  </form>
  <p class="muted">預約模式下，顧客在 LINE 輸入「時段 / 預約 / 我的預約 / 取消」即可自助操作。</p>
{% endif %}
