<div class="grid">
  {% for f in features %}
  <div class="card">
    <h3>{{ f.label }}</h3>
    <p class="muted">月費 {{ (f.monthly_price_cents / 100) | round(0, 'floor') | int }} 元 / 月</p>
    <p>狀態：<span class="badge {{ 'on' if f.enabled else 'off' }}">{{ '已開通' if f.enabled else '未開通' }}</span></p>
    {% if f.enabled %}
    <button hx-post="/ui/features/{{ f.key }}/unsubscribe" hx-target="#features-card" hx-swap="innerHTML"
            hx-confirm="確定退訂 {{ f.label }}？">退訂</button>
    {% else %}
    <button hx-post="/ui/features/{{ f.key }}/subscribe" hx-target="#features-card" hx-swap="innerHTML">訂閱</button>
    {% endif %}
  </div>
  {% endfor %}
</div>
