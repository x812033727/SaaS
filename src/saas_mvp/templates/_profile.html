<h2>公開店家頁設定</h2>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
{% if saved %}<div class="card success">已儲存。</div>{% endif %}
{% if profile and profile.slug %}
<p class="muted">公開網址：<a href="/p/{{ profile.slug }}"><code>/p/{{ profile.slug }}</code></a>
  · 狀態：<span class="badge {{ 'on' if profile.is_published else 'off' }}">{{ '已發佈' if profile.is_published else '未發佈' }}</span></p>
{% endif %}
<form hx-post="/ui/profile" hx-target="#profile-card" hx-swap="innerHTML" class="col">
  <label>網址代稱 (slug)<input name="slug" value="{{ profile.slug if profile else '' }}" maxlength="64" required></label>
  <label>顯示名稱<input name="display_name" value="{{ profile.display_name if profile else '' }}" maxlength="128"></label>
  <label>橫幅圖片網址<input name="banner_url" value="{{ profile.banner_url if profile else '' }}" maxlength="512"></label>
  <label>主題色<input name="theme_color" value="{{ profile.theme_color if profile else '' }}" maxlength="16" placeholder="#06c755"></label>
  <label>社群連結 (JSON)<input name="social_links" value="{{ profile.social_links if profile else '' }}"></label>
  <label>SEO 標題<input name="seo_title" value="{{ profile.seo_title if profile else '' }}" maxlength="256"></label>
  <label>SEO 描述<input name="seo_description" value="{{ profile.seo_description if profile else '' }}" maxlength="512"></label>
  <label>簡介<textarea name="intro">{{ profile.intro if profile else '' }}</textarea></label>
  <label>公告（顯示於公開頁頂端）<textarea name="announcement" placeholder="例：本週四公休">{{ profile.announcement if profile else '' }}</textarea></label>
  <label><input name="is_published" type="checkbox" value="true" {{ 'checked' if profile and profile.is_published else '' }}> 發佈（對外公開）</label>
  <button type="submit">儲存</button>
</form>
