{% extends "base.html" %}
{% block title %}註冊 · LINE Bot 管理{% endblock %}
{% block content %}
<div class="auth-wrap">
  <span class="auth-brand">LINE Bot 管理</span>
  <div class="card">
    <h1>註冊店家</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/ui/register">
      <label for="tenant_name">店家名稱</label>
      <input id="tenant_name" name="tenant_name" type="text" required value="{{ tenant_name or '' }}">
      <label for="email">電子郵件</label>
      <input id="email" name="email" type="email" required value="{{ email or '' }}">
      <label for="password">密碼（至少 8 字元）</label>
      <input id="password" name="password" type="password" required minlength="8">
      <button type="submit">建立帳號</button>
    </form>
    <div class="center-link">已有帳號？<a href="/ui/login">登入</a></div>
  </div>
</div>
{% endblock %}
