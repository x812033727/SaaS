{% extends "base.html" %}
{% block title %}重設密碼 · LINE Bot 管理{% endblock %}
{% block content %}
<h1>重設密碼</h1>
<div class="card">
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/ui/reset-password/{{ token }}">
    <label for="password">新密碼（至少 8 字元）</label>
    <input id="password" name="password" type="password" required minlength="8"
           autocomplete="new-password">
    <button type="submit">重設密碼</button>
  </form>
</div>
{% endblock %}
